services:
  - type: web
    name: agent-orchestrator-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm run seed && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false 
      - key: GROQ_API_KEY
        sync: false 
